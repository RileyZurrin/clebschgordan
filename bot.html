<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Hide page until math is typeset and fonts are ready, to avoid a flash of raw LaTeX (FOUC) -->
    <style>body { visibility: hidden; }</style>
    <script>
      function showBody() { if (document.body) document.body.style.visibility = "visible"; }
      window.addEventListener("load", function () {
        (document.fonts && document.fonts.ready ? document.fonts.ready : Promise.resolve()).then(showBody);
      });
      setTimeout(showBody, 3000); // failsafe: reveal even if a resource hangs
    </script>
    <title>Clebsch-Gordan Calculator</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" integrity="sha384-n8MVd4RsNIU0tAv4ct0nTaAbDJwPJzDEaqSD1odI+WdtXRGWt2kTvGFasHpSy3SV" crossorigin="anonymous">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js" integrity="sha384-XjKyOOlGwcjNTAIQHIpgOno0Hl1YQqzUOEleOLALmuqehneUG+vnGctmUb0ZY0l8" crossorigin="anonymous"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js" integrity="sha384-+VBxd3r6XgURycqtZ117nYw44OOcIax56Z4dCRWbxyPt0Koah1uHoK0o4+/RRE05" crossorigin="anonymous"
        onload="renderMathInElement(document.body);"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="style.css?v=1.15">
</head>
<body>
    <div class="banner">
        <h1>\(| j_1 j_2 m_1 m_2 \rangle = \sum\limits_{J} C \  | J M j_1 j_2 \rangle \)</h1>
    </div>
    <a href="index.html" class="banner-button">Back</a>

    <form id="cg-form" data-mode="bot">
        <div class="input-group-container">
            <div class="input-group">
                <label for="input1" class="input-label">\(j_1\)</label>
                <input type="text" id="input1" class="input-field" inputmode="text" autocomplete="off" required>
                <div class="options-container">
                    <button type="button" class="fill-option" onclick="fillInput('input1', '1/2')">\(\frac{1}{2}\)</button>
                    <button type="button" class="fill-option" onclick="fillInput('input1', '1')">\(1\)</button>
                    <button type="button" class="fill-option" onclick="fillInput('input1', '3/2')">\(\frac{3}{2}\)</button>
                    <button type="button" class="fill-option" onclick="fillInput('input1', '2')">\(2\)</button>
                    <button type="button" class="fill-option" onclick="fillInput('input1', '5/2')">\(\frac{5}{2}\)</button>
                    <button type="button" class="fill-option" onclick="fillInput('input1', '3')">\(3\)</button>
                </div>
            </div>

            <div class="input-group">
                <label for="input2" class="input-label">\(j_2\)</label>
                <input type="text" id="input2" class="input-field" inputmode="text" autocomplete="off" required>
                <div class="options-container">
                    <button type="button" class="fill-option" onclick="fillInput('input2', '1/2')">\(\frac{1}{2}\)</button>
                    <button type="button" class="fill-option" onclick="fillInput('input2', '1')">\(1\)</button>
                    <button type="button" class="fill-option" onclick="fillInput('input2', '3/2')">\(\frac{3}{2}\)</button>
                    <button type="button" class="fill-option" onclick="fillInput('input2', '2')">\(2\)</button>
                    <button type="button" class="fill-option" onclick="fillInput('input2', '5/2')">\(\frac{5}{2}\)</button>
                    <button type="button" class="fill-option" onclick="fillInput('input2', '3')">\(3\)</button>
                </div>
            </div>

            <div class="input-group">
                <label for="input3" class="input-label">\(m_1\)</label>
                <input type="text" id="input3" class="input-field" inputmode="text" autocomplete="off" required>
                <div class="options-container">
                    <button type="button" class="fill-option" onclick="fillInput('input3', '0')">\(0\)</button>
                    <button type="button" class="fill-option" onclick="fillInput('input3', '1/2')">\(\frac{1}{2}\)</button>
                    <button type="button" class="fill-option" onclick="fillInput('input3', '1')">\(1\)</button>
                    <button type="button" class="fill-option" onclick="fillInput('input3', '3/2')">\(\frac{3}{2}\)</button>
                    <button type="button" class="fill-option" onclick="fillInput('input3', '2')">\(2\)</button>
                    <button type="button" class="fill-option" onclick="inputSign('input3')">\(\pm\)</button>
                </div>
            </div>

            <div class="input-group">
                <label for="input4" class="input-label">\(m_2\)</label>
                <input type="text" id="input4" class="input-field" inputmode="text" autocomplete="off" required>
                <div class="options-container">
                    <button type="button" class="fill-option" onclick="fillInput('input4', '0')">\(0\)</button>
                    <button type="button" class="fill-option" onclick="fillInput('input4', '1/2')">\(\frac{1}{2}\)</button>
                    <button type="button" class="fill-option" onclick="fillInput('input4', '1')">\(1\)</button>
                    <button type="button" class="fill-option" onclick="fillInput('input4', '3/2')">\(\frac{3}{2}\)</button>
                    <button type="button" class="fill-option" onclick="fillInput('input4', '2')">\(2\)</button>
                    <button type="button" class="fill-option" onclick="inputSign('input4')">\(\pm\)</button>
                </div>
            </div>
        </div>

        <div class="status">
            <p id="error" class="error" role="alert"></p>
        </div>
        <div class="button-container">
            <button type="submit" class="button">Calculate!</button>
        </div>
    </form>

    <script src="script.js?v=1.14"></script>
</body>
</html>
